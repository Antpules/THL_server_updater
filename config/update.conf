# 更新系统配置文件
# ==================

# 应用程序目录
# 这是您的服务端应用程序安装的位置
APP_DIR="/home/lj/server/InterceptingPlate_Server/build"

# 服务名称
# 您的应用程序的systemd服务名称
SERVICE_NAME="websocket_server"

# 日志级别
# 选项: DEBUG, INFO, WARNING, ERROR
LOG_LEVEL="INFO"

# 更新检查间隔（秒）
# 检查更新的频率
CHECK_INTERVAL=10

# 备份保留数量
# 保留的备份数量
BACKUP_RETENTION=5

# 包验证
# 启用包完整性验证
ENABLE_VERIFICATION=true

# 验证方法
# 选项: MD5, SHA256
VERIFICATION_METHOD="SHA256"

# 超时设置
# 服务停止超时（秒）
STOP_TIMEOUT=30

# 服务启动超时（秒）
START_TIMEOUT=60

# 部署超时（秒）
DEPLOY_TIMEOUT=120

# 要监控的U盘挂载点
# 空格分隔的挂载点列表
USB_MOUNT_POINTS="/media /mnt /run/media"

# 更新包扩展名
UPDATE_PACKAGE_EXTENSION="tar.gz"

# 版本文件名
VERSION_FILE="version.txt"

# 要更新的可执行文件名（仅当使用单个可执行文件更新时生效）
# 示例：EXECUTABLE_NAME="server-app"
EXECUTABLE_NAME="websocket_server"

# 是否支持单个可执行文件更新
# 可选值：true, false
SUPPORT_SINGLE_EXECUTABLE="true"

# tar.gz包安装路径
# 当更新包为tar.gz格式时使用的安装路径
# 留空时使用APP_DIR作为默认路径
# 示例：TAR_GZ_INSTALL_DIR="/home/user/app/tar_install"
TAR_GZ_INSTALL_DIR="/home/lj/server"

# 配置文件路径
# 配置文件所在的目录
# 留空时不更新配置文件
# 示例：CONFIG_DIR="/home/user/app/config"
CONFIG_DIR="/home/lj/server/InterceptingPlate_Server/config"

# 配置文件名
# 要更新的配置文件名称
# 留空时不更新配置文件
# 示例：CONFIG_FILE="config.json"
CONFIG_FILE="config.json"