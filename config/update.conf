# 更新系统配置文件
# ==================

# 应用程序目录
# 这是您的服务端应用程序安装的位置
APP_DIR="/usr/local/app"

# 服务名称
# 您的应用程序的systemd服务名称
SERVICE_NAME="server-app"

# 日志级别
# 选项: DEBUG, INFO, WARNING, ERROR
LOG_LEVEL="INFO"

# 更新检查间隔（秒）
# 检查更新的频率
CHECK_INTERVAL=10

# 备份保留数量
# 保留的备份数量
BACKUP_RETENTION=5

# 包验证
# 启用包完整性验证
ENABLE_VERIFICATION=true

# 验证方法
# 选项: MD5, SHA256
VERIFICATION_METHOD="SHA256"

# 超时设置
# 服务停止超时（秒）
STOP_TIMEOUT=30

# 服务启动超时（秒）
START_TIMEOUT=60

# 部署超时（秒）
DEPLOY_TIMEOUT=120

# 要监控的U盘挂载点
# 空格分隔的挂载点列表
USB_MOUNT_POINTS="/media /mnt /run/media"

# 更新包扩展名
UPDATE_PACKAGE_EXTENSION="tar.gz"

# 版本文件名
VERSION_FILE="version.txt"